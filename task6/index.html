<!DOCTYPE html>
<html>
    <head>
        <title>User card</title>
        <style>
            body{
                background-color: rgb(173, 194, 134);
                text-align: center;
                
            }
            .card{
                position: relative;
                width: 200px;
                display: inline-block;
                background-color: bisque;
                border: 2px solid green;
                border-radius: 10px;
                padding:20px;
                box-shadow: 0px 5px 5px rgb(48, 45, 45);

            }
            .badge{
                position: absolute;
                top: 10px;
                right: 10px;

                background-color: green;
                color: white;
                border-radius: 30px;
            }
        </style>

    </head>
    <body>
        <div class="card">
            <div class="badge">Online</div>
            <img src="myimg.jpg" alt="User">
            <h3>Tamal</h3>
            <p>I like playing games</p>

        </div>
        
    </body>
</html>
